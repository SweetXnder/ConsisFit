<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ConsisFit | Initialize Profile</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #0b0c10; color: #c5c6c7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-box { background: #1f2833; padding: 40px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); width: 380px; border: 1px solid #45a29e; }
        h2 { color: #66fcf1; text-align: center; margin-top: 0; letter-spacing: 2px; font-size: 1.3rem; }
        label { display: block; margin-top: 15px; font-size: 0.8rem; color: #45a29e; text-transform: uppercase; letter-spacing: 0.5px;}
        input, select { width: 100%; padding: 11px; margin-top: 5px; background: #0b0c10; border: 1px solid #45a29e; color: white; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background: #66fcf1; color: #000; font-weight: bold; padding: 12px; border: none; border-radius: 6px; margin-top: 25px; cursor: pointer; font-size: 0.95rem; letter-spacing: 0.5px; transition: 0.2s; }
        button:hover { background: #45a29e; color: white; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>ATHLETE PROFILE ENGINE</h2>
        <form method="POST" action="/onboarding">
            <label>Age Target</label>
            <input type="number" name="age" required>
            <label>Weight (kg)</label>
            <input type="number" name="weight" required>
            <label>Height (cm)</label>
            <input type="number" name="height" required>
            <label>Gender Mapping</label>
            <select name="gender" required>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
            <label>Primary Biomechanical Objective</label>
            <input type="text" name="goal" placeholder="e.g., V-Taper Morph, Muscle-Up Unlock" required>
            <button type="submit">COMPILE & BOOT SYSTEM</button>
        </form>
    </div>
</body>
</html>
