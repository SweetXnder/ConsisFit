<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consisfit | Landing Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
    :root {
      --green:       #4ade57;
      --green-bright:#6fff79;
      --green-dim:   #2a8c31;
      --green-glow:  rgba(74,222,87,0.45);
      --green-dark:  #1a5c1f;
      --black:       #050505;
      --dark:        #0d0d0d;
      --card:        #111;
      --white:       #f0f0f0;
      --grey:        #888;

      --font-display:'Black Ops One', cursive;
      --font-body:   'Rajdhani', sans-serif;
      --font-mono:   'Orbitron', monospace;

      /* Timing */
      --spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
      --smooth:  cubic-bezier(0.23, 1.00, 0.32, 1);
      --snappy:  cubic-bezier(0.40, 0.00, 0.20, 1);

      --dur-fast:  0.18s;
      --dur-mid:   0.35s;
      --dur-slow:  0.55s;
      --dur-xslow: 0.80s;

      /* Neon glow definitions */
      --neon-sm:  0 0 6px #4ade57, 0 0 14px rgba(74,222,87,0.6);
      --neon-md:  0 0 8px #4ade57, 0 0 22px rgba(74,222,87,0.65), 0 0 44px rgba(74,222,87,0.3);
      --neon-lg:  0 0 10px #4ade57, 0 0 30px rgba(74,222,87,0.7), 0 0 70px rgba(74,222,87,0.35), 0 0 120px rgba(74,222,87,0.15);
      --neon-txt: 0 0 7px #4ade57, 0 0 18px rgba(74,222,87,0.8), 0 0 36px rgba(74,222,87,0.4);
      --neon-txt-lg: 0 0 10px #6fff79, 0 0 28px rgba(74,222,87,0.9), 0 0 60px rgba(74,222,87,0.5), 0 0 100px rgba(74,222,87,0.2);
    }

    /* =============================================
       RESET
       ============================================= */
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; overflow:hidden; background:var(--black); font-family:var(--font-body); color:var(--white); }

    /* =============================================
       SCREEN SYSTEM
       ============================================= */
    .screen { position:fixed; inset:0; width:100%; height:100%; display:none; overflow-y:auto; z-index:1; }
    .screen.active { display:flex; flex-direction:column; }

    /* Scanline */
    body::after {
      content:''; position:fixed; inset:0;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);
      pointer-events:none; z-index:9999;
    }
    #particles { position:fixed; inset:0; pointer-events:none; z-index:0; }

    /* =============================================
       GLOBAL MORPH TRANSITIONS
       ============================================= */
    button, input, .sex-btn, .tree-dot, .streak-cell,
    .macro-row, .profile-panel, .nutrition-panel,
    .streak-panel, .chatbot-panel, .form-card {
      transition:
        background    var(--dur-mid)  var(--smooth),
        color         var(--dur-fast) var(--snappy),
        border-color  var(--dur-mid)  var(--smooth),
        box-shadow    var(--dur-mid)  var(--smooth),
        transform     var(--dur-mid)  var(--spring),
        border-radius var(--dur-slow) var(--spring),
        letter-spacing var(--dur-mid) var(--smooth),
        padding       var(--dur-mid)  var(--spring),
        filter        var(--dur-mid)  var(--smooth);
      position:relative; overflow:hidden;
      -webkit-tap-highlight-color:transparent;
    }

    /* =============================================
       AMBIENT GLOW BLOBS  (behind everything)
       ============================================= */
    .amb {
      position:absolute; border-radius:50%;
      filter:blur(80px); pointer-events:none; z-index:0;
      animation:ambFloat 8s ease-in-out infinite;
    }
    @keyframes ambFloat {
      0%,100%{transform:translateY(0) scale(1)}
      50%{transform:translateY(-18px) scale(1.06)}
    }

    /* =============================================
       SCREEN 1 — LANDING
       ============================================= */
    #screen-landing {
      background: radial-gradient(ellipse 100% 80% at 50% 50%, #0a1f0b 0%, #050505 65%);
      align-items:center; justify-content:center;
      position:relative; overflow:hidden;
    }

    /* Grid */
    #screen-landing::before {
      content:''; position:absolute; inset:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(74,222,87,0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,222,87,0.055) 1px, transparent 1px);
      background-size:56px 56px;
    }

    /* Geo SVG */
    .geo-lines { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
    .geo-lines svg { width:100%; height:100%; }

    /* Landing ambient blobs */
    .land-blob1 { width:500px; height:500px; background:radial-gradient(circle, rgba(74,222,87,0.13) 0%, transparent 70%); top:-100px; left:50%; transform:translateX(-50%); animation-delay:0s; }
    .land-blob2 { width:300px; height:300px; background:radial-gradient(circle, rgba(74,222,87,0.08) 0%, transparent 70%); bottom:50px; right:10%; animation-delay:3s; }

    /* Logo */
    .landing-logo-3d {
      font-family:'Black Ops One',cursive;
      font-size:clamp(56px,11vw,136px);
      line-height:0.9; color:#e8e8e8;
      text-shadow: 3px 3px 0 #2a2a2a, 6px 6px 0 #161616, 0 0 40px rgba(74,222,87,0.25), 0 0 80px rgba(74,222,87,0.12);
      -webkit-text-stroke:1px rgba(74,222,87,0.15);
      letter-spacing:-2px; margin-bottom:14px;
      animation:logoEnter 1.1s var(--smooth) both;
      user-select:none; position:relative;
    }
    .landing-logo-3d::after {
      content:attr(data-text); position:absolute; inset:0; color:transparent;
      -webkit-text-stroke:2px rgba(74,222,87,0.18); filter:blur(12px);
      animation:logoGlow 3.5s ease-in-out infinite;
    }
    @keyframes logoGlow { 0%,100%{opacity:.35} 50%{opacity:.8} }
    @keyframes logoEnter { from{opacity:0;transform:translateY(44px) scale(0.93)} to{opacity:1;transform:translateY(0) scale(1)} }

    .landing-tagline {
      font-family:'Rajdhani',sans-serif;
      font-size:clamp(12px,1.5vw,17px); font-weight:700; letter-spacing:4px;
      color:var(--green); text-shadow: var(--neon-sm); border-bottom:1.5px solid var(--green);
      filter:drop-shadow(0 0 6px rgba(74,222,87,0.5));
      padding-bottom:5px; margin-bottom:48px;
      animation:logoEnter 1.2s 0.12s var(--smooth) both;
    }

    /* =============================================
       PAGE TRANSITION EFFECTS
       ============================================= */
    .fade-out {
      opacity: 0 !important;
      pointer-events: none !important;
      transition: opacity 0.4s var(--smooth) !important;
    }

    /* Slide Up & Fade for top elements */
    .slide-up-out {
      opacity: 0 !important;
      transform: translateY(-60px) !important;
      pointer-events: none !important;
      animation: none !important; /* Stop entrance animations to allow transition */
      transition: all 0.7s var(--smooth) !important;
    }

    /* Slide Down & Fade for the hint text */
    .slide-down-out {
      opacity: 0 !important;
      transform: translateY(40px) !important;
      pointer-events: none !important;
      animation: none !important; /* Stop text typing/pulsing animations */
      transition: all 0.6s var(--smooth) !important;
    }

    .morph-expand {
      background: #081609 !important; 
      border: 1.5px solid var(--green-bright) !important;
      box-shadow: 0 0 40px 5px rgba(74,222,87,0.8), inset 0 0 30px rgba(74,222,87,0.4) !important;
      border-radius: 50px !important; 
      transform: scale(60) !important; 
      transition: 
        transform 1s cubic-bezier(0.7, 0, 0.1, 1), 
        background 0.8s ease, 
        box-shadow 0.8s ease !important;
    }

    /* Hero Button Configuration */
    .btn-hero { background:transparent; border:none; cursor:pointer; padding:0; outline:none; animation:logoEnter 1.3s 0.28s var(--smooth) both; overflow:visible; }
    
    .btn-hero-inner {
      display:flex; align-items:center; gap:14px; padding:15px 44px;
      border:1.5px solid rgba(74,222,87,0.5); border-radius:6px;
      background:linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(10,30,12,0.6) 100%);
      backdrop-filter:blur(12px);
      box-shadow:0 0 20px rgba(74,222,87,0.12), inset 0 1px 0 rgba(74,222,87,0.15);
      transition:
        background     var(--dur-slow) var(--spring),
        border-color   var(--dur-mid)  var(--smooth),
        box-shadow     var(--dur-slow) var(--smooth),
        border-radius  var(--dur-xslow) var(--spring),
        transform      var(--dur-slow) var(--spring),
        padding        var(--dur-slow) var(--spring);
      position:relative; z-index:2; overflow:hidden;
      will-change: transform, box-shadow, background;
    }
    
    .btn-hero-inner::before {
      content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
      background:linear-gradient(90deg, transparent, rgba(74,222,87,0.16), transparent);
      transition:left 0.6s var(--smooth), opacity 0.6s var(--smooth);
      opacity:0;
    }

    @media (hover: hover) { .btn-hero:hover .btn-hero-inner::before { left:140%; opacity:1; } }

    .btn-hero-text-gray { font-family:'Black Ops One',cursive; font-size:clamp(14px,1.8vw,20px); letter-spacing:4px; color:#ccc; transition:color var(--dur-mid) var(--smooth), letter-spacing var(--dur-slow) var(--smooth), text-shadow var(--dur-slow) var(--smooth); }
    .btn-hero-text-green { font-family:'Black Ops One',cursive; font-size:clamp(14px,1.8vw,20px); letter-spacing:4px; color:var(--green); text-shadow: var(--neon-sm); transition:text-shadow var(--dur-slow) var(--smooth); }
    .btn-hero-icon { opacity:.85; transition:transform var(--dur-slow) var(--spring), opacity var(--dur-mid) var(--smooth), filter var(--dur-mid) var(--smooth); }

    .btn-hero-ring { position:absolute; inset:-4px; border:1.5px solid rgba(74,222,87,0.3); border-radius:10px; pointer-events:none; z-index:1; opacity:0; }
    .btn-hero-ring2 { inset:-14px; border-color:rgba(74,222,87,0.1); border-radius:18px; }
    @keyframes ringPulse { 0%,100%{opacity:.65;transform:scale(1);box-shadow:0 0 0px transparent} 50%{opacity:0;transform:scale(1.08);box-shadow:0 0 20px rgba(74,222,87,0.2)} }

    @media (hover: hover) {
      .btn-hero:hover .btn-hero-ring { animation:ringPulse 2.6s var(--smooth) infinite; }
      .btn-hero:hover .btn-hero-ring2 { animation-delay:1.2s; }
      .btn-hero:hover .btn-hero-inner {
        background:linear-gradient(135deg, rgba(74,222,87,0.14) 0%, rgba(20,60,22,0.8) 100%);
        border-color:var(--green);
        box-shadow:0 0 40px rgba(74,222,87,0.5), 0 0 90px rgba(74,222,87,0.18), inset 0 0 28px rgba(74,222,87,0.1);
        border-radius:52px; padding:15px 58px; transform:scale(1.046);
      }
      .btn-hero:hover .btn-hero-text-gray  { color:#fff; letter-spacing:6px; text-shadow:0 0 10px rgba(255,255,255,0.3); }
      .btn-hero:hover .btn-hero-text-green { text-shadow:var(--neon-md); }
      .btn-hero:hover .btn-hero-icon       { transform:translateX(10px) scale(1.18); opacity:1; filter:drop-shadow(0 0 8px #4ade57); }
    }
    .btn-hero:active .btn-hero-inner     { transform:scale(0.94); border-radius:8px; box-shadow:0 0 70px rgba(74,222,87,0.8), inset 0 0 35px rgba(74,222,87,0.3); }

    .btn-scroll-hint {
      font-family:'Rajdhani',sans-serif; font-size:12px; letter-spacing:3px; font-weight:600;
      color:rgba(255, 255, 255, 0.35); text-transform:uppercase; margin-top:20px;
      white-space:nowrap; width:100%; overflow: hidden; max-width: 0; text-align: center;
      animation:hintSlowType 4s steps(40) 2s forwards, hintFade 3s ease-in-out 2s infinite;
    }
    @keyframes hintFade { 0%,100%{opacity:.3} 50%{opacity:.9} }
    @keyframes hintSlowType { 0% { max-width: 0; } 100% { max-width: 100%; } }

</style>
</head>
<body>
  <div id="screen-landing" class="screen active">
  <div class="amb land-blob1"></div>
  <div class="amb land-blob2"></div>
  <div class="geo-lines">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <line x1="0"    y1="900" x2="600"  y2="0"   stroke="#4ade57" stroke-width="0.8" opacity="0.12"/>
      <line x1="200"  y1="900" x2="900"  y2="0"   stroke="#4ade57" stroke-width="0.5" opacity="0.08"/>
      <line x1="1440" y1="0"   x2="800"  y2="900" stroke="#4ade57" stroke-width="0.8" opacity="0.12"/>
      <line x1="1240" y1="0"   x2="580"  y2="900" stroke="#4ade57" stroke-width="0.5" opacity="0.08"/>
      <circle cx="720" cy="450" r="320" fill="none" stroke="#4ade57" stroke-width="0.5" opacity="0.1"/>
      <circle cx="720" cy="450" r="200" fill="none" stroke="#4ade57" stroke-width="0.3" opacity="0.08"/>
      <circle cx="720" cy="450" r="90"  fill="none" stroke="#4ade57" stroke-width="0.7" opacity="0.14"/>
    </svg>
  </div>

  <div style="position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:0 8vw">
    <div class="landing-logo-3d" data-text="CONSISFIT">CONSISFIT</div>
    <div class="landing-tagline">Personalized Calisthenics Guide</div>

    <button id="btn-hero-start" class="btn-hero" onclick="morphTransition(event)">
      <span class="btn-hero-ring"></span>
      <span class="btn-hero-ring btn-hero-ring2"></span>
      <span class="btn-hero-inner">
        <span class="btn-hero-text-gray">GET STARTED</span>
        <span class="btn-hero-text-green">NOW</span>
        <svg class="btn-hero-icon" width="36" height="20" viewBox="0 0 38 22" fill="none">
          <!-- Stickman Pushup -->
          <line x1="4"  y1="18" x2="34" y2="4"  stroke="#4ade57" stroke-width="2" stroke-linecap="round"/>
          <circle cx="4" cy="17" r="2.5" fill="#4ade57"/>
          <line x1="14" y1="12" x2="10" y2="19" stroke="#4ade57" stroke-width="2" stroke-linecap="round"/>
          <line x1="28" y1="5.5" x2="30" y2="13" stroke="#4ade57" stroke-width="2" stroke-linecap="round"/>
          <line x1="30" y1="13" x2="36" y2="11" stroke="#4ade57" stroke-width="2" stroke-linecap="round"/>
          <line x1="10" y1="19" x2="15" y2="19" stroke="#4ade57" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
    </button>
    <div id="btn-scroll-hint" class="btn-scroll-hint">Tap to change your physique!</div>
  </div>
</div>

<script>
  // Nice change of text hint
  const hints = [
    "Your Journey Starts Here!",
    "Your calisthenics journey starts here!",
    "Ready to get stronger and fitter?",
    "Personalized workouts at your fingertips!",
    "Consistency is key - let's begin!",
    "Your AI Coach is waiting!",
    "Compete and level up your fitness!",
    "Your personalized calisthenics guide awaits!",
  ];

  let hintIndex = 0;
  const hintElement = document.getElementById('btn-scroll-hint');

  setInterval(() => {
    hintElement.style.animation = "none";
    hintElement.style.opacity = "0";

    setTimeout(() => {
      hintIndex = (hintIndex + 1) % hints.length;
      hintElement.textContent = hints[hintIndex];

      void hintElement.offsetWidth;
      hintElement.style.animation = "hintSlowType 4s steps(40) forwards, hintFade 3s ease-in-out infinite";
    }, 400);
  }, 6500);

  // morph transition script
  function morphTransition(event) {
    event.preventDefault();
    
    // Top elements slide up and fade
    const topElements = document.querySelectorAll('.landing-logo-3d, .landing-tagline');
    topElements.forEach(el => el.classList.add("slide-up-out"));

    // The hint drops down and fades
    const hintText = document.querySelector('.btn-scroll-hint');
    if (hintText) hintText.classList.add("slide-down-out");

    // Fades the background normally
    const bgElements = document.querySelectorAll('.amb, .geo-lines');
    bgElements.forEach(el => el.classList.add("fade-out"));

    // Hides or fades out text, icons, AND the decorative rings inside the button
    const btnInnerContents = document.querySelectorAll('#btn-hero-start .btn-hero-text-gray, #btn-hero-start .btn-hero-text-green, #btn-hero-start .btn-hero-icon, .btn-hero-ring, .btn-hero-ring2');
    btnInnerContents.forEach(el => el.classList.add("fade-out"));

    const heroBtn = document.getElementById('btn-hero-start');
    const heroInner = document.querySelector('.btn-hero-inner');

    // Prevent double clicking
    heroBtn.style.pointerEvents = "none";
    
    // Clear the entrance animation to unlock stacking context constraints
    heroBtn.style.animation = "none";
    heroBtn.style.transform = "none"; 

    // Slight delay lets the text begin to fade before the massive scale triggers
    setTimeout(() => {
      heroInner.classList.add('morph-expand');
    }, 150);

    // Smoothly transition to the next page after the morph completes
    setTimeout(() => {
      window.location.href = '/start';
    }, 1100);
  }
</script>
</body>
</html>
